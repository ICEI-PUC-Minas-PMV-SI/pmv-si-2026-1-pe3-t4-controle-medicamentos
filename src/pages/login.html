<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCMU — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/login.css" />
</head>

<body>

    <main class="login-page">

        <div class="bg-blob bg-blob-1"></div>
        <div class="bg-blob bg-blob-2"></div>

        <div class="login-canvas">

            <div class="brand">
                <div class="brand-icon">
                    <span class="material-symbols-outlined">clinical_notes</span>
                </div>
                <div class="brand-name">SCMU</div>
                <div class="brand-tagline">Hospital Universitário PUC-MG</div>
            </div>

            <div class="login-card">

                <div class="card-heading">
                    <h2 class="card-title">Bem-vindo de volta</h2>
                    <p class="card-subtitle">
                        Insira suas credenciais clínicas para acessar a unidade de Gestão de Medicamentos.
                    </p>
                </div>

                <form class="form" id="login-form" novalidate>

                    <div class="field">
                        <div class="field-header">
                            <label class="field-label" for="email">E-mail</label>
                        </div>
                        <div class="input-wrap">
                            <span class="material-symbols-outlined input-icon">alternate_email</span>
                            <input class="form-input" id="email" type="email" placeholder="exemplo@email.com"
                                autocomplete="email" />
                        </div>
                        <span class="field-error" id="email-error"></span>
                    </div>

                    <div class="field">
                        <div class="field-header">
                            <label class="field-label" for="senha">Senha</label>
                            <a class="forgot-link" href="recuperar-senha.html">Esqueceu a senha?</a>
                        </div>
                        <div class="input-wrap">
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <input class="form-input has-toggle" id="senha" type="password" placeholder="••••••••"
                                autocomplete="current-password" />
                            <button class="toggle-password" type="button" id="toggle-senha" aria-label="Mostrar senha">
                                <span class="material-symbols-outlined" id="toggle-icon">visibility</span>
                            </button>
                        </div>
                        <span class="field-error" id="senha-error"></span>
                    </div>

                    <!-- Erro geral (credenciais inválidas) -->
                    <p id="form-error" style="font-size:13px; color:var(--error); display:none; padding: 0 4px;"></p>

                    <button class="btn-signin" id="btn-signin" type="submit">
                        <div class="spinner"></div>
                        <span class="btn-label">Entrar no SCMU</span>
                    </button>

                </form>

                <div class="card-footer">
                    <span class="material-symbols-outlined">verified_user</span>
                    <span class="card-footer-text">Somente pessoal clínico autorizado</span>
                </div>

            </div>


            <div class="global-links">
                <a href="politica-privacidade.html">Política de Privacidade</a>
                <a href="#">Suporte</a>
                <a href="#">Status do Sistema</a>
            </div>

        </div>

        <img class="deco-image"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAAI_1_SJGTPaoUtt3h0COZobVqoR5NI6_25MNVyUYBqg_lx46FwoMp8fJZm2Kz9nhOfT-X_NCTR_aE7C198KodKSyS4GD3ZnlHTq6ZXkK2MJypUZzymOmn6dAJEqOQGskzSdWrTix4TIz6u-3c5040rV3DZAnI8INGWRKmE-OSsOT74h4SbfDkvXZp4ZTRGE1GTpMZow8mQZIzTmsm0ta_9QDRo_t6VvieNuM4elOPYsilZ8dWdyjxCfQxaDYTKSvPQDCKqt2eEeg"
            alt="Hospital Universitário PUC-MG" />

    </main>

    <script src="../js/shared.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
